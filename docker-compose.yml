services:
  czechmedmcp-server:
    platform: linux/amd64
    build: .
    image: us.gcr.io/graceful-medley-134315/czechmedmcp-server:${TAG}
    container_name: czechmedmcp-server
    ports:
      - "8000:8000"
    environment:
      - MCP_MODE=streamable_http # Can be 'stdio', 'worker', 'http', or 'streamable_http'
      - ALPHAGENOME_API_KEY=${ALPHAGENOME_API_KEY:-}
    restart: unless-stopped
